basePath: /api
definitions:
  controller.AccountResponse:
    properties:
      account_type:
        type: string
      currency:
        type: string
      date_created:
        example: "2024-02-29"
        type: string
      id:
        type: string
      status:
        type: string
    type: object
  controller.DepositMoneyRequest:
    properties:
      amount:
        format: float64
        type: number
      toAccountId:
        type: string
    type: object
  controller.GetAccountsForUserResponse:
    properties:
      accounts:
        items:
          $ref: '#/definitions/controller.AccountResponse'
        type: array
    type: object
  controller.TransferMoneyRequest:
    properties:
      amount:
        format: float64
        type: number
      fromAccountId:
        type: string
      toAccountId:
        type: string
    type: object
  controller.TransferMoneyStatusRequest:
    properties:
      transferId:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This will take in user requests for equipments they want
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Equipment Picker Calculator API
  version: "0.1"
paths:
  /:userId/accounts:
    get:
      description: Creates an account attached to a user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.GetAccountsForUserResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Creates an account attached to a user
      tags:
      - identity
  /:userId/create-account:
    post:
      description: Creates an account attached to a user
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Creates an account attached to a user
      tags:
      - identity
  /create-user:
    post:
      description: Creates a user
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Creates a user
      tags:
      - identity
  /deposit:
    post:
      consumes:
      - application/json
      description: Deposits money into an account
      parameters:
      - description: Deposits money request desc
        in: body
        name: request"
        required: true
        schema:
          $ref: '#/definitions/controller.DepositMoneyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Deposits money into an account
      tags:
      - transfer
  /getTransferStatus:
    post:
      consumes:
      - application/json
      description: Get status about transfer
      parameters:
      - description: Transfer money status request desc
        in: body
        name: request"
        required: true
        schema:
          $ref: '#/definitions/controller.TransferMoneyStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get status about transfer
      tags:
      - transfer
  /health/liveness:
    get:
      description: Check if app is live
      responses:
        "200":
          description: OK
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Check if app is live
      tags:
      - health
  /health/readiness:
    get:
      description: Check if app is ready to handle connections
      responses:
        "200":
          description: OK
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Check if app is ready to handle connections
      tags:
      - health
  /transfer:
    post:
      consumes:
      - application/json
      description: Transfers money from one account to another
      parameters:
      - description: Transfer money request desc
        in: body
        name: request"
        required: true
        schema:
          $ref: '#/definitions/controller.TransferMoneyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Transfers money from one account to another
      tags:
      - transfer
swagger: "2.0"
