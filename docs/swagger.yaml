basePath: /api
definitions:
  controller.AccountResponse:
    properties:
      account_type:
        type: string
      currency:
        type: string
      date_created:
        example: "2024-02-29"
        type: string
      id:
        type: string
      status:
        type: string
    type: object
  controller.GetAccountsForUserResponse:
    properties:
      accounts:
        items:
          $ref: '#/definitions/controller.AccountResponse'
        type: array
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This will take in user requests for equipments they want
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Equipment Picker Calculator API
  version: "0.1"
paths:
  /:userId/accounts:
    get:
      description: Creates an account attached to a user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.GetAccountsForUserResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Creates an account attached to a user
      tags:
      - identity
  /:userId/create-account:
    post:
      description: Creates an account attached to a user
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Creates an account attached to a user
      tags:
      - identity
  /create-user:
    post:
      description: Creates a user
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Creates a user
      tags:
      - identity
swagger: "2.0"
