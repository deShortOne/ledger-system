apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app
spec:
  replicas: 2

  selector:
    matchLabels:
      app: go-app

  template:
    metadata:
      labels:
        app: go-app

    spec:
      containers:
        - name: go-app
          image: deshortone/ledger-system-practice:latest

          ports:
            - containerPort: 8080

          env:
            - name: POSTGRES_HOST
              value: postgres

            - name: POSTGRES_PORT
              value: "5432"

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
